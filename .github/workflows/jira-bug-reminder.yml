name: 🐛 Jira Bug Reminder

on:
  # schedule:
  #   # Setiap jam 01:00–11:00 UTC = 08:00–18:00 WIB (Senin–Jumat)
  #   - cron: "0 1,3,5,7,9,11 * * 1-5"
  repository_dispatch:
    types: [cron-from-cronjob-org] # Nama bebas, sesuaikan nanti di cron-job.org

  workflow_dispatch:             # manual trigger

jobs:
  bug-reminder:
    name: Check Jira Bugs & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 120         # max 2 jam per run (sesuai window jam kerja)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o eng-reminder ./cmd/main.go

      - name: Run Bug Reminder
        env:
          # ── Jira ──────────────────────────────────────────────────
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_MAX_RESULTS: ${{ vars.JIRA_MAX_RESULTS || '10' }}
          JIRA_NEW_BUG_WINDOW_MINUTES: ${{ vars.JIRA_NEW_BUG_WINDOW_MINUTES || '10' }}
          BUG_HANGING_MINUTES: ${{ vars.BUG_HANGING_MINUTES || '10' }}
          CODE_REVIEW_HANGING_MINUTES: ${{ vars.CODE_REVIEW_HANGING_MINUTES || '10' }}

          # ── Discord ─────────────────────────────────────────────
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_LEAD_IDS: ${{ secrets.DISCORD_LEAD_IDS }}
          DISCORD_SP_ALERT_WEBHOOK_URL: ${{ secrets.DISCORD_SP_ALERT_WEBHOOK_URL }}
          DISCORD_CODE_REVIEW_WEBHOOK_URL: ${{ secrets.DISCORD_CODE_REVIEW_WEBHOOK_URL }}
        run: ./eng-reminder
