name: 🐛 Jira Bug Reminder

on:
  schedule:
    # Runs every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: # allow manual trigger for testing

jobs:
  bug-reminder:
    name: Check Jira Bugs & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o eng-reminder ./cmd/main.go

      - name: Run Bug Reminder
        env:
          # ── Jira ──────────────────────────────────────────────────
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_MAX_RESULTS: ${{ vars.JIRA_MAX_RESULTS || '10' }}
          JIRA_NEW_BUG_WINDOW_MINUTES: ${{ vars.JIRA_NEW_BUG_WINDOW_MINUTES || '15' }}
          BUG_HANGING_MINUTES: ${{ vars.BUG_HANGING_MINUTES || '10' }}
          CODE_REVIEW_HANGING_MINUTES: ${{ vars.CODE_REVIEW_HANGING_MINUTES || '10' }}

          # ── Discord ─────────────────────────────────────────────
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_LEAD_IDS: ${{ vars.DISCORD_LEAD_IDS }}
        run: ./eng-reminder
